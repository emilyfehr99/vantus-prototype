name: Daily Job Search

on:
  schedule:
    # Runs at 7 AM CST (13:00 UTC)
    - cron: '0 13 * * *'
  workflow_dispatch:  # Allow manual triggers

jobs:
  job-search:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Chrome for Selenium
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create config from secrets
        run: |
          cat > config.yaml << 'EOF'
          # Auto-generated from GitHub Secrets
          gemini_api_keys:
            - "${{ secrets.GEMINI_API_KEY_1 }}"
            - "${{ secrets.GEMINI_API_KEY_2 }}"

          email:
            smtp_server: "smtp.gmail.com"
            smtp_port: 587
            sender_email: "${{ secrets.SMTP_EMAIL }}"
            sender_password: "${{ secrets.SMTP_PASSWORD }}"
            recipient_email: "${{ secrets.RECIPIENT_EMAIL }}"

          resume: |
            ${{ secrets.RESUME_TEXT }}

          search_preferences:
            locations:
              - "Manitoba"
              - "Winnipeg, MB"
              - "Remote Canada"
              - "Canada"
              - "Toronto"
              - "Vancouver"
              - "Calgary"
              - "Edmonton"
              - "Ottawa"
            keywords:
              - "sports analyst"
              - "hockey analyst"
              - "sports data analyst"
              - "performance analyst"
              - "video analyst sports"
              - "data analyst"
              - "business intelligence"
              - "data scientist"
              - "analytics"
              - "research analyst"
              - "BI analyst"
              - "reporting analyst"
            target_companies:
              - "Bison Transport"
              - "Stathletes"
              - "Sportlogiq"
              - "Second Spectrum"
              - "Stats Perform"
              - "Catapult Sports"
              - "NHL"
              - "Winnipeg Jets"
              - "Toronto Maple Leafs"
              - "Montreal Canadiens"
              - "Calgary Flames"
              - "Edmonton Oilers"
              - "Vancouver Canucks"
              - "Ottawa Senators"
              - "MLSE"
            min_match_score: 60
            top_jobs_count: 25
            permanent_only: true
            max_applicants: 100

          schedule:
            enabled: true
            interval_days: 1
            time: "07:00"
          EOF

      - name: Run job search
        run: python job_finder.py
        env:
          DISPLAY: ':99'
