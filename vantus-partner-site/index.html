<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vantus Safety | Defense Technology</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --safety-green: #00FF41;
      --alert-red: #FF3B30;
      --stealth-gray: #1a1a1a;
    }

    body {
      background-color: #000000;
      margin: 0;
      font-family: 'Inter', sans-serif;
      color: white;
      overflow-x: hidden;
    }

    .font-mono {
      font-family: 'JetBrains Mono', monospace;
    }

    .vertical-text {
      writing-mode: vertical-rl;
      transform: rotate(180deg);
    }

    /* Tactical Scrollbar */
    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: #000;
    }

    ::-webkit-scrollbar-thumb {
      background: #111;
      border: 1px solid #222;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--safety-green);
    }

    /* Scanline Effect */
    .scanline {
      width: 100%;
      height: 100px;
      z-index: 100;
      background: linear-gradient(0deg, rgba(0, 255, 65, 0) 0%, rgba(0, 255, 65, 0.015) 50%, rgba(0, 255, 65, 0) 100%);
      opacity: 0.1;
      position: fixed;
      bottom: 100%;
      left: 0;
      pointer-events: none;
      animation: scanline 10s linear infinite;
    }

    @keyframes scanline {
      0% {
        bottom: 100%;
      }

      100% {
        bottom: -100px;
      }
    }

    /* CRT Flicker Simulation */
    .crt-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 255, 0, 0.03));
      z-index: 98;
      background-size: 100% 3px, 3px 100%;
      pointer-events: none;
      opacity: 0.15;
    }

    .selection-green::selection {
      background: var(--safety-green);
      color: black;
    }

    html {
      scroll-behavior: smooth;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
  </style>

</head>

</html>
